<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Problems | nikehub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Parkinsans:wght@300..800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS VARIABLES */
        :root {
            --primary-color: #050505;
            --primary-hover: #2563eb;
            --primary-dark: #0f172a;
            --primary-light: #94a3ba;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --background-color: #0a0a0a;
            --card-bg: #141212;
            --card-border: #1e293b;
            --shadow: rgba(0, 0, 0, 0.4);
            --popup-bg: #1e293b;
            --header-bg: #0a0a0a;
            --header-color: #fffffa;
            --accent-glow: rgba(59, 130, 246, 0.2);
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Parkinsans', 'Inter', system-ui, sans-serif;
            background-color: var(--background-color);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-color);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER & NAVIGATION */
        header {
            background: #030000;
            color: var(--header-color);
            padding: 0.75rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #3f3f46;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            gap: 1.5rem;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .search-container {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 700px;
        }

        #searchBar {
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--card-border);
            flex-grow: 1;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.03);
            color: white;
            transition: all 0.2s ease;
        }

        #searchBar:focus {
            outline: none;
            border-color: var(--primary-hover);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #settings {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* GRID & CARDS */
        #container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.25rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 640px) {
            #container { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        }

        .zone-item {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .zone-item:hover {
            transform: translateY(-4px);
            border-color: var(--primary-hover);
        }

        .zone-item.featured { border: 1.5px solid var(--primary-hover); }
        .zone-item.featured::before {
            content: "FEATURED";
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--primary-hover);
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 800;
            z-index: 10;
        }

        .zone-item img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            filter: grayscale(10%);
        }

        .zone-info { padding: 1rem; text-align: center; }
        .zone-name { font-weight: 600; font-size: 0.95rem; }

        /* QUOTE AREA */
        .quote-container {
            text-align: center;
            padding: 2rem 1rem 0 1rem;
            transition: opacity 0.5s ease;
        }
        #quoteText { display: block; font-style: italic; color: var(--text-color); font-size: 1.1rem; }
        #quoteAuthor { display: block; color: var(--text-muted); font-size: 0.85rem; margin-top: 5px; }

        /* NOTICE BAR */
        .server-notice {
            background: #7f1d1d;
            color: #fca5a5;
            text-align: center;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* VIEWER (Overlay) */
        #zoneViewer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--background-color);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }
        #viewerHeader {
            padding: 10px 20px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
        }
        #zoneFrame { flex-grow: 1; border: none; background: #fff; }

        /* MODAL / POPUP */
        #popupOverlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center;
            z-index: 3000;
        }
        .popup-content {
            background: var(--popup-bg);
            padding: 2rem;
            border-radius: var(--radius-lg);
            width: 90%; max-width: 500px;
            max-height: 80vh; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="server-notice">
        <i class="fas fa-server"></i>
        I heard your feedback and removed ads. Watch ads on the donate page to help for free!
    </div>

    <header>
        <div class="header-content">
            <div class="logo" onclick="location.reload()">
                <i class="fa-solid fa-code"></i>
                <span>nikehub</span>
            </div>
            
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Search Zones...">
                <select id="sortOptions" style="background: #1e293b; color: white; border-radius: 8px; padding: 0 10px;">
                    <option value="popular">Popular</option>
                    <option value="name">Name</option>
                </select>
            </div>
            
            <button id="settings">
                <i class="fas fa-sliders-h"></i>
                <span>Settings</span>
            </button>
        </div>
    </header>

    <main>
        <div class="quote-container" id="quoteContainer">
            <span id="quoteText">"OMG nikehub is the most tuff site to ever exist."</span>
            <span id="quoteAuthor">- defo said by gn math 🙏</span>
        </div>

        <div id="container">
            <div class="loading" style="text-align: center; grid-column: 1/-1; padding: 3rem;">
                <i class="fas fa-spinner fa-spin"></i> Loading Zones...
            </div>
        </div>
    </main>

    <div id="zoneViewer">
        <div id="viewerHeader">
            <div>
                <strong id="zoneName">Game</strong> 
                <span id="zoneAuthor" style="font-size: 0.8rem; margin-left: 10px; color: var(--text-muted);"></span>
                <span id="zoneId" style="display:none"></span>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="fullscreenZone()" class="btn"><i class="fas fa-expand"></i></button>
                <button onclick="closeZone()" class="btn" style="background: #ef4444;"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <iframe id="zoneFrame"></iframe>
    </div>

    <div id="popupOverlay">
        <div class="popup-content">
            <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                <h2 id="popupTitle">Settings</h2>
                <button id="popupClose" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-times"></i></button>
            </div>
            <div id="popupBody"></div>
        </div>
    </div>

    <script>
        /* --- CONFIGURATION --- */
        const BLOCKLIST = {
            ids: [],
            names: ["Soundboard", "[!] COMMENTS", "Geometry Dash Lite (REMAKE)", "[!] SUGGEST GAMES .gg/D4c9VFYWyU"]
        };

        const EXTERNAL_TAB_LIST = [
            "[!] SUGGEST GAMES • Tiktok",
            "Upvote On UBGHUB!",
            "Donate For Free!",
        ];

        const POSITIONING_RULES = [
            { name: "[!] SUGGEST GAMES • Tiktok", position: 0 },
            { name: "Upvote On UBGHUB!", position: 1 }
        ];

        const CUSTOM_ZONES = [];

        const CDN_SOURCES = [
            {
                name: "noseygames",
                zones: "https://cdn.jsdelivr.net/gh/NoseyGames/data@main/zones.json",
                covers: "https://cdn.jsdelivr.net/gh/NoseyGames/covers@latest/",
                html: "https://cdn.jsdelivr.net/gh/gn-math/html@main"
            },
            {
                name: "gn-math",
                zones: "https://cdn.jsdelivr.net/gh/gn-math/assets@latest/zones.json",
                covers: "https://cdn.jsdelivr.net/gh/gn-math/covers@main",
                html: "https://cdn.jsdelivr.net/gh/gn-math/html@main"
            }
        ];

        const quotes = [
            { text: "Your gay.", author: "Classroomspot" },
            { text: "Umm i had some beef.", author: "Classroomspot" },
            { text: "ugh i hate working on my ui", author: "NikeGtag" },
            { text: "OMG nikehub is the most tuff site to ever exist.", author: "defo said by gn math 🙏" },
            { text: "Reality is merely an illusion, albeit a very persistent one.", author: "idk bro dont ask me" },
            { text: "PLEASEEE promote me", author: "GN-Math" },
            { text: "What kind of mango is this?", author: "Some tiktоk" },
            { text: "Dawg take a shower", author: "Unknown Hub" }
        ];

        /* --- STATE --- */
        let zoneSourceMap = new Map();
        let zones = [];
        let popularityData = {};
        let config = {
            panicKey: localStorage.getItem('panicKey') || '1',
            panicUrl: localStorage.getItem('panicUrl') || 'https://launchpad.classlink.com/login',
            cloakTitle: localStorage.getItem('cloakTitle') || 'Number Problems',
            cloakIcon: localStorage.getItem('cloakIcon') || 'favicon.png'
        };

        /* --- UI FUNCTIONS --- */
        function updateQuote() {
            const quoteEl = document.getElementById('quoteText');
            const authorEl = document.getElementById('quoteAuthor');
            const container = document.getElementById('quoteContainer');
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            
            container.style.opacity = 0;
            setTimeout(() => {
                quoteEl.textContent = `"${randomQuote.text}"`;
                authorEl.textContent = `- ${randomQuote.author}`;
                container.style.opacity = 1;
            }, 500);
        }

        /* --- CORE LOGIC --- */
        async function listZones() {
            try {
                const results = await Promise.all(CDN_SOURCES.map(async cdn => {
                    try {
                        const res = await fetch(cdn.zones + "?t=" + Date.now());
                        const data = await res.json();
                        return data.map(z => ({ zone: z, source: cdn }));
                    } catch (e) { return []; }
                }));

                const allItems = results.flat();
                zones = deduplicateZones(allItems).filter(z => !isBlocked(z));
                await fetchPopularity();
                sortZones();
            } catch (error) {
                document.getElementById('container').innerHTML = "<p>Failed to load zones.</p>";
            }
        }

        function deduplicateZones(list) {
            const seen = new Set();
            const unique = [];
            list.forEach(item => {
                if (!seen.has(item.zone.id)) {
                    seen.add(item.zone.id);
                    zoneSourceMap.set(item.zone.id, item.source);
                    unique.push(item.zone);
                }
            });
            return unique;
        }

        function isBlocked(zone) {
            const name = zone.name.toLowerCase();
            return BLOCKLIST.names.some(b => name.includes(b.toLowerCase()));
        }

        async function fetchPopularity() {
            try {
                const res = await fetch(`https://data.jsdelivr.net/v1/stats/packages/gh/gn-math/html@main/files?period=year`);
                if (res.ok) {
                    const data = await res.json();
                    data.forEach(f => {
                        const m = f.name.match(/\/(\d+)\.html$/);
                        if (m) popularityData[parseInt(m[1])] = f.hits.total;
                    });
                }
            } catch (e) {}
        }

        function sortZones() {
            const sortBy = document.getElementById('sortOptions').value;
            let sorted = [...zones];

            if (sortBy === 'name') sorted.sort((a,b) => a.name.localeCompare(b.name));
            else if (sortBy === 'popular') sorted.sort((a,b) => (popularityData[b.id]||0) - (popularityData[a.id]||0));

            POSITIONING_RULES.forEach(rule => {
                const idx = sorted.findIndex(z => z.name === rule.name);
                if (idx !== -1) {
                    const [item] = sorted.splice(idx, 1);
                    sorted.splice(rule.position, 0, item);
                }
            });

            displayZones(sorted);
        }

        function displayZones(list) {
            const container = document.getElementById('container');
            container.innerHTML = "";
            const query = document.getElementById('searchBar').value.toLowerCase();

            list.filter(z => z.name.toLowerCase().includes(query)).forEach(file => {
                const item = document.createElement("div");
                item.className = "zone-item" + (file.featured ? " featured" : "");
                item.onclick = () => openZone(file);

                const cdn = zoneSourceMap.get(file.id) || CDN_SOURCES[0];
                const cover = file.isExternal ? file.cover : file.cover.replace("{COVER_URL}", cdn.covers);

                item.innerHTML = `
                    <img loading="lazy" src="${cover}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                    <div class="zone-info"><div class="zone-name">${file.name}</div></div>
                `;
                container.appendChild(item);
            });
        }

        function openZone(file) {
            if (EXTERNAL_TAB_LIST.includes(file.name)) {
                window.open(file.url, "_blank");
                return;
            }
            const viewer = document.getElementById('zoneViewer');
            const frame = document.getElementById('zoneFrame');
            const cdn = zoneSourceMap.get(file.id) || CDN_SOURCES[0];
            
            viewer.style.display = "flex";
            document.getElementById('zoneName').textContent = file.name;
            
            if (file.isExternal) {
                frame.src = file.url;
            } else {
                const url = file.url.replace("{HTML_URL}", cdn.html);
                fetch(url).then(r => r.text()).then(html => {
                    const doc = frame.contentDocument;
                    doc.open(); doc.write(html); doc.close();
                });
            }
        }

        function closeZone() {
            document.getElementById('zoneViewer').style.display = "none";
            document.getElementById('zoneFrame').src = "about:blank";
        }

        function fullscreenZone() {
            const f = document.getElementById('zoneFrame');
            if (f.requestFullscreen) f.requestFullscreen();
        }

        /* --- CLOAKING --- */
        function applyCloak() {
            document.title = config.cloakTitle;
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.rel = 'shortcut icon'; link.href = config.cloakIcon;
            document.head.appendChild(link);
        }

        /* --- INIT --- */
        document.getElementById('searchBar').addEventListener('input', sortZones);
        document.getElementById('sortOptions').addEventListener('change', sortZones);
        document.getElementById('settings').addEventListener('click', () => {
            alert("Settings panel would open here. Logic is active in your code!");
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === config.panicKey) window.location.replace(config.panicUrl);
            if (e.key === 'Escape') closeZone();
        });

        setInterval(updateQuote, 30000);
        applyCloak();
        listZones();

    </script>
</body>
</html>
